version: '3.8'

services:
  # 1. Координатор для Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bank_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - bank_net

  # 2. Брокер сообщений
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bank_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Настраиваем доступы: внутри Docker сети (29092) и снаружи для локальной разработки (9092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - bank_net

  # 3. Реляционная БД (Стейт клиентов и модели)
  postgres:
    image: postgres:15-alpine
    container_name: bank_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_password
      POSTGRES_DB: bank_churn_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - bank_net

  # 4. Документоориентированная БД (Сырые логи инференса)
  mongodb:
    image: mongo:6.0
    container_name: bank_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password
    volumes:
      - mongo_data:/data/db
    networks:
      - bank_net

  # 5. In-Memory кэш (Для дедупликации)
  redis:
    image: redis:7-alpine
    container_name: bank_redis
    ports:
      - "6379:6379"
    networks:
      - bank_net

# Создаем общую сеть для общения контейнеров
networks:
  bank_net:
    driver: bridge

# Сохраняем данные БД на жестком диске (чтобы при рестарте не пропадали базы)
volumes:
  pg_data:
  mongo_data:
